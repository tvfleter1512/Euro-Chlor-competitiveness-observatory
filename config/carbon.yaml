indicator:
  # net indirect carbon cost per tonne Cl2 for a compensated installation:
  # EUA_monthly_avg × zone emission factor × intensity × (1 − aid_intensity)
  # NOTE: member states without indirect-cost compensation face the gross figure.
  methodology_version: "v1.1"   # v1.1: per-zone factors replace single placeholder
  # zone factor per detail country (chlor-alkali producing member states)
  country_zones:
    DE: ets_ef_cwe
    FR: ets_ef_france
    NL: ets_ef_netherlands
    BE: ets_ef_belgium
    ES: ets_ef_iberia
    IT: ets_ef_italy
    PL: ets_ef_poland
  # headline EU row uses CWE (Germany = largest EU chlor-alkali producer);
  # feeds the cost-gap waterfall
  headline_zone: ets_ef_cwe

cbam:
  # Regulation (EU) 2023/956 Annex I: organic chemicals and polymers EXCLUDED
  # from CBAM scope at launch. Commission assessment on extension to organic
  # chemicals/polymers due by end-2027, with ETS-wide ambition ~2030.
  basket_status: "excluded_annex_I"
  review_milestone: "2027-12-31"
  citation: "Regulation (EU) 2023/956, Annex I; Art. 30 review clause"
  source_url: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:32023R0956"
