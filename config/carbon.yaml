# Carbon module configuration — legal-text constants stored WITH citation
# (spec §8: benchmark values are read from the source Communication, never
# inlined in code). Everything here is seeded into the benchmark_constant
# table by bootstrap and stays confirmed: false until verified against the
# cited document by a human.
benchmark_constants:
  ets_cl_electricity_intensity:
    value: 1.846
    unit: "MWh/t Cl2"
    citation: "Communication 2021/C 528/01, Annex II — electricity consumption efficiency benchmark for chlorine (CL); prior reference 2020/C 317/04"
    source_url: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:52021XC1230(01)"
    confirmed: false
  ets_aid_intensity:
    value: 0.75
    unit: "share"
    citation: "Communication 2020/C 317/04 (ETS State aid guidelines post-2021) — maximum aid intensity 75%; CONFIRM clause"
    source_url: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:52020XC0925(01)"
    confirmed: false
  ets_emission_factor:
    value: 0.76
    unit: "tCO2/MWh"
    citation: "Communication 2021/C 528/01, Annex III — regional CO2 emission factor; VALUE IS ZONE-DEPENDENT, CONFIRM the factor for the zone(s) of interest"
    source_url: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:52021XC1230(01)"
    confirmed: false

indicator:
  # net indirect carbon cost per tonne Cl2 for a compensated installation:
  # EUA_monthly_avg × emission_factor × intensity × (1 − aid_intensity)
  # NOTE: several member states do NOT operate indirect-cost compensation —
  # for those, exposure is the uncompensated product (aid_intensity = 0).
  methodology_version: "v1.0"

cbam:
  # Regulation (EU) 2023/956 Annex I: organic chemicals and polymers EXCLUDED
  # from CBAM scope at launch. Commission assessment on extension to organic
  # chemicals/polymers due by end-2027; ETS-wide ambition ~2030.
  basket_status: "excluded_annex_I"
  review_milestone: "2027-12-31"
  citation: "Regulation (EU) 2023/956, Annex I; Art. 30 review clause"
  source_url: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:32023R0956"
