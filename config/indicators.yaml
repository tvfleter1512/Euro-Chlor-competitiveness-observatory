# Competitiveness indicators (spec §9) — versioned, auditable formulas.
# The benchmarking agent computes exactly what is declared here and stores
# methodology_version with every output row.
indicators:
  electricity_cost_ratio:
    methodology_version: "v1.0"
    name: "Electricity cost ratio (EU vs comparator)"
    formula: "EU industrial delivered EUR/MWh ÷ comparator industrial delivered EUR/MWh, per period"
    inputs: ["power.industrial_delivered"]
    unit: "ratio"
    note: "Delivered price, not wholesale. Comparator rows flagged 'estimated' propagate the flag."

  trade_balance:
    methodology_version: "v1.0"
    name: "Embedded-chlorine trade balance"
    formula: "exports_eur − imports_eur per product per period, EU27 vs extra-EU"
    inputs: ["trade.value"]
    unit: "EUR"

  trade_balance_quantity:
    methodology_version: "v1.0"
    name: "Embedded-chlorine trade balance (quantity)"
    formula: "exports_t − imports_t per product per period, EU27 vs extra-EU"
    inputs: ["trade.quantity"]
    unit: "t"

  gas_hub_spread:
    methodology_version: "v1.0"
    name: "Natural-gas hub price spread (EU − US)"
    formula: "EU hub price (IMF Europe/TTF-based) − US Henry Hub, USD/MMBtu, monthly"
    inputs: ["gas.hub_price"]
    unit: "USD/MMBtu"
    note: "The causal driver behind the electricity cost ratio (assessment §2.2)."

  gas_hub_ratio:
    methodology_version: "v1.0"
    name: "Natural-gas hub price ratio (EU ÷ US)"
    formula: "EU hub price ÷ US Henry Hub, monthly"
    inputs: ["gas.hub_price"]
    unit: "ratio"

  ecu_margin_proxy:
    methodology_version: "v1.0"
    name: "EU ECU cash-margin proxy"
    formula: >
      1.128 × caustic_dry_price + 1.0 × chlorine_value_proxy − mwh_per_ecu × power_price,
      per semester. caustic_dry_price = extra-EU export unit value of CN8 28151200
      (lye) × dry_factor 2.0. chlorine_value_proxy = extra-EU export unit value of
      EDC (29031500) × cl_mass_fraction_edc. power_price = EU27 delivered,
      band MWH_GE150000, X_VAT.
    inputs: ["trade.value", "trade.quantity", "power.industrial_delivered"]
    unit: "EUR/ECU"
    params:
      mwh_per_ecu: 2.629          # membrane technology, 2025 — confirmed by owner 2026-07-09
      cl_mass_fraction_edc: 0.716 # Cl2 mass share of EDC (2×35.45/98.96)
      naoh_dry_per_ecu: 1.128     # from conversions.yaml ecu section
      caustic_dry_factor: 2.0     # 50% lye -> 100% dry basis
    params_confirmed: true        # confirmed by owner 2026-07-09
    note: >
      Public-data proxy of ECU economics, NOT a P&L margin: excludes carbon
      (Phase 2), other variable costs, and uses trade unit values as price
      proxies. Directional/trend use only (assessment §2.3).

  import_penetration:
    methodology_version: "v1.0"
    name: "Import penetration — caustic soda (dry basis)"
    formula: >
      extra-EU imports (dry t) ÷ apparent consumption, where apparent consumption
      = PRODCOM sold production + extra-EU imports − extra-EU exports (all dry t).
      Dry t: solid CN8 28151100 as-is; lye 28151200 × 0.5 (NaOH content of 50% lye).
    inputs: ["production.sold_production", "trade.quantity"]
    unit: "share"
    params:
      lye_dry_content: 0.5        # CONFIRM: NaOH content of standard 50% lye
      prodcom_basis_assumed: "100% NaOH"   # CONFIRM: PRODCOM 20132525/20132527 quantity basis
    params_confirmed: false
    note: >
      Quality flag 'estimated': PRODCOM sold production excludes captive use and
      the PRODCOM quantity basis for lye needs confirmation. Trend use only.

  utilisation_gap:
    methodology_version: "v1.0"
    name: "Utilisation gap (EU − comparator)"
    formula: "EU operating rate − comparator operating rate, percentage points"
    inputs: ["production.utilisation"]
    unit: "pp"
    status: phase2

  carbon_cost_exposure:
    methodology_version: "v1.0"
    name: "Carbon cost exposure net of indirect-cost compensation"
    formula: "EUA_price × electricity_intensity_benchmark × (1 − aid_intensity), benchmark read from benchmark_constant table with citation"
    inputs: ["carbon.eua_price", "benchmark_constant"]
    unit: "EUR/t"
    status: phase2

  cost_gap:
    methodology_version: "v1.0"
    name: "Cost gap vs comparator (EUR per tonne ECU)"
    formula: >
      power_gap + carbon_gap, per semester, per comparator.
      power_gap = (EU delivered power − comparator delivered power, EUR/MWh)
      × mwh_per_ecu. carbon_gap = EU net indirect carbon cost per t Cl2 −
      comparator carbon cost (0 for US/CN/Gulf/India — no equivalent indirect
      carbon pricing on electrolysis; revisit if that changes).
    inputs: ["power.industrial_delivered", "carbon_cost_exposure"]
    unit: "EUR/ECU"
    params:
      mwh_per_ecu: 2.629          # membrane technology, 2025 — confirmed by owner 2026-07-09
      comparator_carbon_cost: 0.0 # no equivalent indirect carbon pricing in comparator regions
    params_confirmed: true        # confirmed by owner 2026-07-09
    note: >
      Replaces the composite index (see metric assessment §3): every component
      is in the same physical unit, weights are intensities rather than
      opinions, and the decomposition maps directly to policy levers.
      Extensible: gas- and freight-gap terms can be added as components.

  composite_index:
    methodology_version: "v1.0"
    name: "Composite competitiveness index"
    formula: "SUPERSEDED — replaced by cost_gap (metric assessment §3: incommensurable units, unfounded weights, silent renormalisation). Retained for methodology history only."
    status: superseded_by_cost_gap
